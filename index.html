<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Чат SLAPYA</title>
    
    <!-- ПОДКЛЮЧЕНИЕ БИБЛИОТЕК FIREBASE -->
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>

    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #080808; color: #fff; font-family: -apple-system, system-ui, sans-serif; margin: 0; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        
        .card { background: #111; border: 1px solid #222; border-radius: 24px; width: 95%; max-width: 400px; height: 85vh; display: flex; flex-direction: column; padding: 15px; box-shadow: 0 20px 50px rgba(0,0,0,0.9); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding: 0 5px; }
        
        #status-dot { width: 10px; height: 10px; background: red; border-radius: 50%; display: inline-block; margin-right: 8px; box-shadow: 0 0 8px red; transition: 0.5s; }
        .logo { color: #ff004d; font-weight: 900; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }

        #chatBox { flex: 1; overflow-y: auto; background: #050505; border-radius: 20px; padding: 12px; display: flex; flex-direction: column; gap: 10px; border: 1px solid #1a1a1a; scroll-behavior: smooth; }
        
        .msg { padding: 10px 14px; border-radius: 18px; max-width: 85%; font-size: 14px; background: #1a1a1a; word-wrap: break-word; line-height: 1.4; position: relative; animation: fadeIn 0.2s ease; }
        .mine { align-self: flex-end; background: #ff004d; color: #fff; border-bottom-right-radius: 4px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .input-area { display: flex; gap: 10px; margin-top: 15px; background: #1a1a1a; padding: 8px 8px 8px 18px; border-radius: 30px; border: 1px solid #222; }
        input { flex: 1; border: none; background: transparent; color: #fff; font-size: 15px; outline: none; }
        
        .send-btn { background: #ff004d; border: none; color: #fff; border-radius: 50%; width: 42px; height: 42px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .send-btn:active { transform: scale(0.9); }
        
        .yt-icon { width: 42px; height: 42px; border-radius: 50%; border: 2px solid #ff004d; object-fit: cover; transition: 0.3s; }
        .yt-icon:hover { transform: scale(1.1); box-shadow: 0 0 15px rgba(255, 0, 77, 0.4); }
    </style>
</head>
<body>

    <div class="card">
        <div class="header">
            <div><div id="status-dot"></div> <span class="logo">ЧАТ ДЛЯ ВАС!</span></div>
            <a href="https://youtube.com" target="_blank">
                <img src="yt.jpg" onerror="this.src='https://pravatar.cc'" class="yt-icon">
            </a>
        </div>
        <div id="chatBox"></div>
        <div class="input-area">
            <input type="text" id="chatInput" placeholder="Напишите..." autocomplete="off">
            <button class="send-btn" id="sendBtn">➤</button>
        </div>
    </div>

<script>
    // Проверка готовности Firebase
    const checkFirebase = setInterval(() => {
        if (typeof firebase !== 'undefined') {
            clearInterval(checkFirebase);
            initApp();
        }
    }, 300);

    function initApp() {
        const firebaseConfig = {
            apiKey: "AIzaSyBCuF9Eeu4Imh8kzHto2rNor-P_bgjpeWU",
            authDomain: "://firebaseapp.com",
            databaseURL: "https://firebaseio.com",
            projectId: "slapya-tv",
            storageBucket: "slapya-tv.firebasestorage.app",
            messagingSenderId: "136766849891",
            appId: "1:136766849891:web:deba1aac85e51e6e4894f6"
        };

        // Инициализация
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        // Анонимный вход
        auth.signInAnonymously().catch(e => console.log("Auth:", e.message));

        // Мониторинг соединения (Точка)
        db.ref(".info/connected").on("value", (snap) => {
            const dot = document.getElementById('status-dot');
            const connected = snap.val();
            dot.style.background = connected ? "lime" : "red";
            dot.style.boxShadow = connected ? "0 0 10px lime" : "0 0 10px red";
        });

        // Уникальный ID сессии
        const myId = 'u' + Math.random().toString(36).substr(2, 5);

        // Функция отправки
        function send() {
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            if (!text) return;
            
            db.ref('messages').push({
                u: myId,
                t: text,
                ts: firebase.database.ServerValue.TIMESTAMP
            }).then(() => {
                input.value = "";
            }).catch(e => alert("Ошибка! Проверь Rules в Firebase."));
        }

        document.getElementById('sendBtn').onclick = send;
        document.getElementById('chatInput').onkeypress = (e) => { if(e.key === 'Enter') send(); };

        // Получение сообщений
        db.ref('messages').limitToLast(50).on('child_added', (snap) => {
            const m = snap.val();
            const d = document.createElement('div');
            d.className = 'msg' + (m.u === myId ? ' mine' : '');
            d.innerText = m.t;
            const box = document.getElementById('chatBox');
            box.appendChild(d);
            box.scrollTop = box.scrollHeight;
        });
    }
</script>
</body>
</html>
