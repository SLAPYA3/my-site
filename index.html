<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Чат для Вас!</title>
    
    <!-- ИСПОЛЬЗУЕМ ДРУГОЙ ИСТОЧНИК (CDNJS) ДЛЯ НАДЕЖНОСТИ -->
    <script src="https://cloudflare.com"></script>
    <script src="https://cloudflare.com"></script>
    <script src="https://cloudflare.com"></script>

    <style>
        * { box-sizing: border-box; }
        body { background: #080808; color: #fff; font-family: sans-serif; margin: 0; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card { background: #111; border: 1px solid #222; border-radius: 20px; width: 95%; max-width: 400px; height: 85vh; display: flex; flex-direction: column; padding: 15px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        #status-dot { width: 10px; height: 10px; background: red; border-radius: 50%; display: inline-block; margin-right: 5px; box-shadow: 0 0 5px red; }
        #chatBox { flex: 1; overflow-y: auto; background: #050505; border-radius: 15px; padding: 10px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px; border-radius: 15px; max-width: 80%; font-size: 14px; background: #1a1a1a; word-wrap: break-word; }
        .mine { align-self: flex-end; background: #ff004d; }
        .input-area { display: flex; gap: 10px; margin-top: 10px; }
        input { flex: 1; padding: 12px; border-radius: 20px; border: none; background: #222; color: #fff; outline: none; }
        button { background: #ff004d; border: none; color: #fff; border-radius: 50%; width: 45px; height: 45px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .yt-icon { width: 45px; height: 45px; border-radius: 50%; border: 2px solid #ff004d; object-fit: cover; }
    </style>
</head>
<body>

    <div class="card">
        <div class="header">
            <div><div id="status-dot"></div> <b style="color:#ff004d; font-size: 14px;">ЧАТ ДЛЯ ВАС!</b></div>
            <img src="yt.jpg" onerror="this.src='https://pravatar.cc'" class="yt-icon">
        </div>
        <div id="chatBox"></div>
        <div class="input-area">
            <input type="text" id="chatInput" placeholder="Напишите что-нибудь...">
            <button id="sendBtn">➤</button>
        </div>
    </div>

<script>
    // Ждем загрузки
    window.addEventListener('load', function() {
        if (typeof firebase === 'undefined') {
            console.error("Firebase не загружен через CDNJS");
            return;
        }

        const firebaseConfig = {
            apiKey: "AIzaSyBCuF9Eeu4Imh8kzHto2rNor-P_bgjpeWU",
            authDomain: "://firebaseapp.com",
            databaseURL: "https://firebaseio.com",
            projectId: "slapya-tv",
            storageBucket: "slapya-tv.firebasestorage.app",
            messagingSenderId: "136766849891",
            appId: "1:136766849891:web:deba1aac85e51e6e4894f6"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        auth.signInAnonymously().catch(e => console.log("Вход..."));

        db.ref(".info/connected").on("value", (s) => {
            const dot = document.getElementById('status-dot');
            dot.style.background = s.val() ? "lime" : "red";
            dot.style.boxShadow = s.val() ? "0 0 10px lime" : "0 0 10px red";
        });

        const myId = Math.random().toString(36).substr(2, 5);

        function send() {
            const i = document.getElementById('chatInput');
            if (!i.value.trim()) return;
            db.ref('messages').push({ u: myId, t: i.value });
            i.value = "";
        }

        document.getElementById('sendBtn').onclick = send;
        document.getElementById('chatInput').onkeypress = (e) => { if(e.key === 'Enter') send(); };

        db.ref('messages').limitToLast(30).on('child_added', (snap) => {
            const m = snap.val();
            const d = document.createElement('div');
            d.className = 'msg' + (m.u === myId ? ' mine' : '');
            d.innerText = m.t;
            document.getElementById('chatBox').appendChild(d);
            document.getElementById('chatBox').scrollTop = document.getElementById('chatBox').scrollHeight;
        });
    });
</script>
</body>
</html>
