<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Чат SLAPYA</title>
    
    <!-- 1. ПОДКЛЮЧАЕМ БИБЛИОТЕКИ FIREBASE -->
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>

    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #080808; color: #fff; font-family: sans-serif; margin: 0; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .card { background: #111; border: 1px solid #222; border-radius: 20px; width: 95%; max-width: 400px; height: 85vh; display: flex; flex-direction: column; padding: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.8); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        #status-dot { width: 10px; height: 10px; background: red; border-radius: 50%; display: inline-block; margin-right: 5px; box-shadow: 0 0 5px red; transition: 0.5s; }
        #chatBox { flex: 1; overflow-y: auto; background: #050505; border-radius: 15px; padding: 10px; display: flex; flex-direction: column; gap: 10px; border: 1px solid #1a1a1a; }
        .msg { padding: 10px 14px; border-radius: 15px; max-width: 80%; font-size: 14px; background: #1a1a1a; word-wrap: break-word; line-height: 1.4; }
        .mine { align-self: flex-end; background: #ff004d; color: #fff; border-bottom-right-radius: 2px; }
        .input-area { display: flex; gap: 10px; margin-top: 15px; background: #1a1a1a; padding: 10px; border-radius: 25px; }
        input { flex: 1; border: none; background: transparent; color: #fff; outline: none; font-size: 15px; }
        button { background: #ff004d; border: none; color: #fff; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
        .yt-icon { width: 45px; height: 45px; border-radius: 50%; border: 2px solid #ff004d; object-fit: cover; cursor: pointer; transition: 0.3s; }
        .yt-icon:hover { transform: scale(1.1); }
    </style>
</head>
<body>

    <div class="card">
        <div class="header">
            <div><div id="status-dot"></div> <b style="color:#ff004d; font-size: 14px;">ЧАТ ДЛЯ ВАС!</b></div>
            <!-- ТВОЯ ССЫЛКА НА ЮТУБ -->
            <a href="https://youtube.com" target="_blank">
                <img src="yt.jpg" onerror="this.src='https://pravatar.cc'" class="yt-icon" title="Мой YouTube">
            </a>
        </div>
        <div id="chatBox"></div>
        <div class="input-area">
            <input type="text" id="chatInput" placeholder="Напишите сообщение...">
            <button id="sendBtn">➤</button>
        </div>
    </div>

<script>
    // Ждем, пока библиотеки загрузятся
    const waitForFirebase = setInterval(() => {
        if (typeof firebase !== 'undefined') {
            clearInterval(waitForFirebase);
            runChat();
        }
    }, 500);

    function runChat() {
        const firebaseConfig = {
            apiKey: "AIzaSyBCuF9Eeu4Imh8kzHto2rNor-P_bgjpeWU",
            authDomain: "://firebaseapp.com",
            databaseURL: "https://firebaseio.com",
            projectId: "slapya-tv",
            storageBucket: "slapya-tv.firebasestorage.app",
            messagingSenderId: "136766849891",
            appId: "1:136766849891:web:deba1aac85e51e6e4894f6"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        // Авторизация
        auth.signInAnonymously().catch(e => console.log("Вход..."));

        // Индикатор сети
        db.ref(".info/connected").on("value", (snap) => {
            const dot = document.getElementById('status-dot');
            if (snap.val() === true) {
                dot.style.background = "lime";
                dot.style.boxShadow = "0 0 10px lime";
            } else {
                dot.style.background = "red";
                dot.style.boxShadow = "0 0 10px red";
            }
        });

        const myId = 'u' + Math.random().toString(36).substr(2, 5);

        // Функция отправки
        function send() {
            const i = document.getElementById('chatInput');
            if (!i.value.trim()) return;
            db.ref('messages').push({ u: myId, t: i.value });
            i.value = "";
        }

        document.getElementById('sendBtn').onclick = send;
        document.getElementById('chatInput').onkeypress = (e) => { if(e.key === 'Enter') send(); };

        // Загрузка сообщений
        db.ref('messages').limitToLast(30).on('child_added', (snap) => {
            const m = snap.val();
            const d = document.createElement('div');
            d.className = 'msg' + (m.u === myId ? ' mine' : '');
            d.innerText = m.t;
            const box = document.getElementById('chatBox');
            box.appendChild(d);
            box.scrollTop = box.scrollHeight;
        });
    }
</script>
</body>
</html>
