<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Чат для Вас!</title>
    <!-- ПОДКЛЮЧАЕМ FIREBASE НАПРЯМУЮ -->
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    <style>
        * { box-sizing: border-box; }
        body { background: #080808; color: #fff; font-family: sans-serif; margin: 0; padding: 0; overflow: hidden; height: 100vh; display: flex; align-items: center; justify-content: center; position: relative; }
        .top-yt-link { position: absolute; top: 20px; right: 20px; text-decoration: none; z-index: 999; }
        .yt-img { width: 60px; height: 60px; border-radius: 50%; border: 2px solid #ff004d; object-fit: cover; background: #222; }
        .card { background: #111; border: 1px solid #222; border-radius: 25px; width: 95%; max-width: 420px; height: 85vh; display: flex; flex-direction: column; padding: 15px; box-shadow: 0 20px 60px rgba(0,0,0,1); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; border-bottom: 1px solid #1a1a1a; padding-bottom: 10px; }
        .logo { font-size: 18px; font-weight: bold; color: #ff004d; }
        #status-dot { width: 10px; height: 10px; background: red; border-radius: 50%; display: inline-block; margin-right: 5px; }
        #chatBox { flex: 1; overflow-y: auto; background: #050505; border-radius: 18px; padding: 12px; display: flex; flex-direction: column; gap: 10px; }
        .msg-wrapper { display: flex; align-items: flex-end; gap: 8px; max-width: 85%; }
        .msg-wrapper.mine { flex-direction: row-reverse; align-self: flex-end; }
        .avatar, .current-user-av { width: 35px; height: 35px; border-radius: 50%; border: 1.5px solid #ff004d; object-fit: cover; background: #333; flex-shrink: 0; }
        .msg { padding: 10px 14px; border-radius: 18px; font-size: 14px; line-height: 1.4; word-wrap: break-word; }
        .mine .msg { background: #ff004d; color: white; border-bottom-right-radius: 2px; }
        .others .msg { background: #1a1a1a; color: #eee; border-bottom-left-radius: 2px; border: 1px solid #222; }
        .input-area { display: flex; gap: 10px; align-items: center; margin-top: 15px; background: #1a1a1a; padding: 8px 12px; border-radius: 25px; }
        input { flex: 1; padding: 5px; border: none; background: transparent; color: #fff; outline: none; font-size: 15px; }
        .file-label { cursor: pointer; font-size: 22px; }
        #avatarInput { display: none; }
        .send-btn { background: #ff004d; color: #fff; border: none; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <a href="https://youtube.com" target="_blank" class="top-yt-link">
        <img src="yt.jpg" onerror="this.src='https://pravatar.cc'" class="yt-img">
    </a>

    <div class="card">
        <div class="header">
            <div>
                <span id="status-dot"></span>
                <span class="logo">ЧАТ ДЛЯ ВАС!</span>
            </div>
            <label class="file-label">✈️<input type="file" id="avatarInput" accept="image/*"></label>
        </div>
        <div id="chatBox"></div>
        <div class="input-area">
            <img id="myCurrentAv" src="https://pravatar.cc" class="current-user-av">
            <input type="text" id="chatInput" placeholder="Напишите сообщение...">
            <button class="send-btn" id="sendBtn">➤</button>
        </div>
    </div>

<script>
    // 1. Инициализация базы
    const firebaseConfig = { databaseURL: "https://firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const messagesRef = db.ref('messages');

    // Проверка связи
    db.ref('.info/connected').on('value', (snap) => {
        document.getElementById('status-dot').style.background = snap.val() ? 'lime' : 'red';
    });

    const userId = localStorage.getItem('userId') || 'u' + Date.now();
    localStorage.setItem('userId', userId);
    
    let userAvatar = localStorage.getItem('userAvatar') || 'https://pravatar.cc';
    document.getElementById('myCurrentAv').src = userAvatar;

    // Смена авы
    document.getElementById('avatarInput').onchange = function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
            const img = new Image();
            img.src = ev.target.result;
            img.onload = () => {
                const canvas = document.createElement('canvas');
                canvas.width = 60; canvas.height = 60;
                canvas.getContext('2d').drawImage(img, 0, 0, 60, 60);
                userAvatar = canvas.toDataURL('image/jpeg', 0.5);
                localStorage.setItem('userAvatar', userAvatar);
                document.getElementById('myCurrentAv').src = userAvatar;
            };
        };
        reader.readAsDataURL(file);
    };

    // Функция отправки
    function send() {
        const input = document.getElementById('chatInput');
        const text = input.value.trim();
        if (!text) return;

        messagesRef.push({
            uid: userId,
            ava: userAvatar,
            txt: text
        }).then(() => {
            input.value = "";
        }).catch(e => alert("БАЗА НЕ ПУСКАЕТ! Проверь Rules в Firebase."));
    }

    document.getElementById('sendBtn').onclick = send;
    document.getElementById('chatInput').onkeydown = (e) => { if(e.key === 'Enter') send(); };

    // Загрузка сообщений
    messagesRef.limitToLast(50).on('child_added', (snap) => {
        const m = snap.val();
        const isMine = m.uid === userId;
        const wrap = document.createElement('div');
        wrap.className = 'msg-wrapper ' + (isMine ? 'mine' : 'others');
        wrap.innerHTML = `<img src="${m.ava}" class="avatar"><div class="msg">${m.txt}</div>`;
        const box = document.getElementById('chatBox');
        box.appendChild(wrap);
        box.scrollTop = box.scrollHeight;
    });
</script>
</body>
</html>
