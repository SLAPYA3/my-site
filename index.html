
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Чат для Вас!</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #080808; color: #fff; font-family: -apple-system, system-ui, sans-serif; margin: 0; padding: 0; overflow: hidden; height: 100vh; display: flex; align-items: center; justify-content: center; position: relative; }
        
        .top-yt-link { position: absolute; top: 20px; right: 20px; text-decoration: none; z-index: 100; transition: 0.3s; }
        .top-yt-link:hover { transform: scale(1.1); filter: drop-shadow(0 0 10px #ff004d); }
        .yt-img { width: 60px; height: 60px; border-radius: 50%; border: 2px solid #ff004d; object-fit: cover; background: #222; }
        .yt-status { width: 14px; height: 14px; background: #00ff00; border: 2px solid #080808; border-radius: 50%; position: absolute; bottom: 5px; right: 5px; }

        .card { background: #111; border: 1px solid #222; border-radius: 20px; width: 100%; max-width: 400px; height: 85vh; display: flex; flex-direction: column; padding: 15px; box-shadow: 0 15px 50px rgba(0,0,0,0.9); z-index: 1; }
        .header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 10px; border-bottom: 1px solid #1a1a1a; margin-bottom: 10px; }
        .logo { font-size: 18px; font-weight: 800; color: #ff004d; }
        
        #chatBox { flex: 1; overflow-y: auto; background: #050505; border-radius: 15px; padding: 12px; display: flex; flex-direction: column; gap: 10px; }
        #chatBox::-webkit-scrollbar { width: 4px; }
        #chatBox::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }

        .msg-wrapper { display: flex; align-items: flex-end; gap: 8px; max-width: 85%; animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .msg-wrapper.mine { flex-direction: row-reverse; align-self: flex-end; }
        .msg-wrapper.others { align-self: flex-start; }

        .avatar { width: 32px; height: 32px; border-radius: 50%; background: #222; object-fit: cover; border: 1.5px solid #ff004d; flex-shrink: 0; }
        .msg { padding: 8px 12px; border-radius: 15px; font-size: 14px; line-height: 1.4; }
        .mine .msg { background: #ff004d; color: white; border-bottom-right-radius: 2px; }
        .others .msg { background: #1a1a1a; color: #eee; border-bottom-left-radius: 2px; border: 1px solid #222; }
        
        .msg-info { font-size: 9px; opacity: 0.5; margin-bottom: 2px; display: block; }
        .input-area { display: flex; gap: 8px; align-items: center; margin-top: 15px; background: #151515; padding: 8px; border-radius: 12px; }
        input { flex: 1; padding: 10px; border: none; background: transparent; color: #fff; outline: none; }
        .file-label { cursor: pointer; font-size: 20px; opacity: 0.7; }
        #avatarInput { display: none; }
        .send-btn { background: #ff004d; color: #fff; border: none; border-radius: 50%; width: 35px; height: 35px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <a href="https://youtube.com" target="_blank" class="top-yt-link">
        <!-- ТВОЯ КАРТИНКА ТЕПЕРЬ ВШИТА КОДОМ -->
        <img src="https://postimg.cc" class="yt-img">
        <div class="yt-status"></div>
    </a>

    <div class="card">
        <div class="header">
            <div class="logo">ЧАТ ДЛЯ ВАС!</div>
            <label class="file-label">📸 <input type="file" id="avatarInput" accept="image/*"></label>
        </div>
        <div id="chatBox"></div>
        <div class="input-area">
            <input type="text" id="chatInput" placeholder="Напишите..." autocomplete="off">
            <button class="send-btn" onclick="send()">➤</button>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://gstatic.com";
    import { getDatabase, ref, push, onChildAdded, serverTimestamp } from "https://gstatic.com";

    const firebaseConfig = { databaseURL: "https://firebaseio.com" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const messagesRef = ref(db, 'messages');

    const userId = localStorage.getItem('userId') || Math.random().toString(36).substring(7);
    localStorage.setItem('userId', userId);
    let userAvatar = localStorage.getItem('userAvatar') || 'https://pravatar.cc';

    document.getElementById('chatInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') send(); });

    document.getElementById('avatarInput').addEventListener('change', function(e) {
        const file = e.target.files;
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(event) {
            userAvatar = event.target.result;
            localStorage.setItem('userAvatar', userAvatar);
        };
        reader.readAsDataURL(file);
    });

    window.send = function() {
        const input = document.getElementById('chatInput');
        const text = input.value.trim();
        if (!text) return;
        push(messagesRef, { userId, avatar: userAvatar, text, timestamp: serverTimestamp() });
        input.value = "";
    };

    onChildAdded(messagesRef, (data) => {
        const msg = data.val();
        const isMine = msg.userId === userId;
        const time = msg.timestamp ? new Date(msg.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : '';
        const wrapper = document.createElement('div');
        wrapper.className = `msg-wrapper ${isMine ? 'mine' : 'others'}`;
        wrapper.innerHTML = `<img src="${msg.avatar}" class="avatar"><div class="msg"><span class="msg-info">${isMine ? 'Вы' : 'Аноним'} ${time}</span>${msg.text}</div>`;
        const box = document.getElementById('chatBox');
        box.appendChild(wrapper);
        box.scrollTop = box.scrollHeight;
    });
</script>
</body>
</html>
