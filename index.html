<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SLAPYA - HUB</title>
    <style>
        :root { --neon: #ff004d; }
        
        /* ПОЛНЫЙ ЗАПРЕТ ВЫДЕЛЕНИЯ И СКРЫТИЕ КУРСОРОВ */
        * { 
            box-sizing: border-box; 
            cursor: none !important; 
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            user-select: none;
            -webkit-user-drag: none;
        } 

        body {
            /* ТВОЯ ГИФКА НА ФОНЕ */
            background: url('back.gif') center center / cover no-repeat #000;
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 5px solid var(--neon);
            box-shadow: inset 0 0 30px var(--neon), 0 0 30px var(--neon);
            font-family: sans-serif;
            transition: box-shadow 0.1s ease;
            position: relative;
        }

        /* ЗАТЕМНЕНИЕ ФОНА */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1;
        }

        /* КУРСОР-АНГЕЛОЧЕК */
        #custom-cursor {
            width: 45px; height: 45px; position: fixed; pointer-events: none; z-index: 10000;
            background: url('yt.jpg') center/cover; border-radius: 50%; border: 2px solid var(--neon);
            box-shadow: 0 0 15px var(--neon); transform: translate(-50%, -50%); display: none;
        }

        /* ДЫМНЫЙ СЛЕД */
        .smoke-particle {
            position: fixed; pointer-events: none; background: var(--neon); border-radius: 50%;
            filter: blur(12px); opacity: 0.5; z-index: 9999;
            transition: transform 0.6s ease-out, opacity 0.6s ease-out;
        }

        .main-container { text-align: center; z-index: 10; position: relative; }
        .avatar-main { width: 120px; height: 120px; border-radius: 50%; border: 4px solid var(--neon); box-shadow: 0 0 25px var(--neon); margin-bottom: 15px; }
        h1 { color: #fff; letter-spacing: 5px; text-transform: uppercase; text-shadow: 0 0 10px var(--neon); margin: 0 0 30px 0; font-size: 28px; }

        .links-wrap { display: flex; flex-direction: column; gap: 15px; }
        .btn {
            display: flex; align-items: center; justify-content: center; width: 280px; padding: 14px;
            background: rgba(0, 0, 0, 0.7); 
            border: 2px solid var(--neon); border-radius: 50px;
            color: #fff; text-decoration: none; font-weight: bold; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px;
        }
        .btn:hover { background: var(--neon); box-shadow: 0 0 30px var(--neon); transform: scale(1.05); }
        .btn img { width: 25px; height: 25px; border-radius: 50%; margin-right: 15px; object-fit: cover; }

        #music-toggle {
            position: absolute; bottom: 30px; background: rgba(0, 0, 0, 0.7); border: 1px solid var(--neon);
            color: var(--neon); padding: 10px 25px; border-radius: 25px; font-size: 11px;
            text-transform: uppercase; letter-spacing: 2px; z-index: 20; transition: 0.3s;
        }
    </style>
</head>
<body>

    <div id="custom-cursor"></div>
    <button id="music-toggle">Play Music</button>

    <div class="main-container">
        <img src="yt.jpg" class="avatar-main">
        <h1>SLAPYA</h1>
        <div class="links-wrap">
            <!-- ПУЛЕНЕПРОБИВАЕМАЯ ССЫЛКА НА ТВОЙ ЮТУБ -->
            <a href="https://www.youtube.com/@SLAPYA" rel="noopener noreferrer" class="btn">
                <img src="yt.jpg"> YOUTUBE
            </a>
            <a href="#" class="btn" style="opacity: 0.8;">
                <img src="tg.jpg" onerror="this.src='yt.jpg'"> TELEGRAM
            </a>
            <a href="#" class="btn" style="opacity: 0.8;">
                <img src="tiktok.jpg" onerror="this.src='yt.jpg'"> TIKTOK
            </a>
        </div>
    </div>

    <audio id="track" src="music.mp3" loop></audio>

    <script>
        const cursor = document.getElementById('custom-cursor');
        const track = document.getElementById('track');
        const btn = document.getElementById('music-toggle');
        let smokeIntensity = 1;

        // КУРСОР И ДЫМ
        document.addEventListener('mousemove', (e) => {
            cursor.style.display = 'block';
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
            createSmoke(e.clientX, e.clientY);
        });

        function createSmoke(x, y) {
            const p = document.createElement('div');
            p.className = 'smoke-particle';
            const size = Math.random() * 20 + 15;
            p.style.width = size + 'px'; p.style.height = size + 'px';
            p.style.left = (x - size/2) + 'px'; p.style.top = (y - size/2) + 'px';
            p.style.opacity = 0.5 * smokeIntensity;
            document.body.appendChild(p);
            setTimeout(() => {
                p.style.transform = `scale(4) translate(${(Math.random()-0.5)*60}px, ${(Math.random()-0.5)*60}px)`;
                p.style.opacity = '0';
            }, 10);
            setTimeout(() => { p.remove(); }, 700);
        }

        // МУЗЫКА И ПУЛЬСАЦИЯ
        btn.addEventListener('click', () => {
            if (track.paused) {
                track.play();
                btn.innerText = "Music: ON";
                initVisualizer();
            } else {
                track.pause();
                btn.innerText = "Music: OFF";
                smokeIntensity = 1;
                document.body.style.boxShadow = `inset 0 0 30px var(--neon), 0 0 30px var(--neon)`;
            }
        });

        function initVisualizer() {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const src = ctx.createMediaElementSource(track);
            const ans = ctx.createAnalyser();
            src.connect(ans); ans.connect(ctx.destination);
            ans.fftSize = 64;
            const data = new Uint8Array(ans.frequencyBinCount);
            function frame() {
                if (!track.paused) {
                    ans.getByteFrequencyData(data);
                    let avg = data.reduce((a, b) => a + b) / data.length;
                    smokeIntensity = 1 + (avg / 40); 
                    let glow = 15 + (avg / 1.5);
                    document.body.style.boxShadow = `inset 0 0 ${glow*2}px var(--neon), 0 0 ${glow*2}px var(--neon)`;
                }
                requestAnimationFrame(frame);
            }
            frame();
        }
    </script>
</body>
</html>
