<script src="https://gstatic.com"></script>
<script src="https://gstatic.com"></script>

<script>
    // 2. ИСПРАВЛЕННЫЙ КОНФИГ (проверь authDomain и databaseURL!)
    const firebaseConfig = {
        apiKey: "AIzaSyBCuF9Eeu4Imh8kzHto2rNor-P_bgjpeWU",
        authDomain: "slapya-tv.firebaseapp.com", // Добавил slapya-tv
        databaseURL: "https://slapya-tv-default-rtdb.firebaseio.com", // Добавил полный URL
        projectId: "slapya-tv",
        storageBucket: "slapya-tv.firebasestorage.app",
        messagingSenderId: "136766849891",
        appId: "1:136766849891:web:deba1aac85e51e6e4894f6"
    };

    // Инициализация
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth(); // Добавили константу для авторизации
    const messagesRef = db.ref('messages');

    // 3. ВКЛЮЧАЕМ АНОНИМНУЮ АВТОРИЗАЦИЮ
    auth.signInAnonymously()
        .then(() => {
            console.log("Авторизован анонимно!");
        })
        .catch((error) => {
            console.error("Ошибка входа:", error.message);
            alert("Ошибка входа: " + error.message);
        });

    // Проверка соединения
    db.ref(".info/connected").on("value", (snap) => {
        const dot = document.getElementById('status-dot');
        if (snap.val() === true) {
            dot.style.background = "lime";
            dot.style.boxShadow = "0 0 10px lime";
        } else {
            dot.style.background = "red";
            dot.style.boxShadow = "0 0 10px red";
        }
    });

    // Генерация ID пользователя (теперь привязана к Firebase Auth)
    let userId = localStorage.getItem('userId') || 'u' + Math.random().toString(36).substr(2, 9);
    localStorage.setItem('userId', userId);
    
    let userAvatar = localStorage.getItem('userAvatar') || 'https://pravatar.cc';
    document.getElementById('myCurrentAv').src = userAvatar;

    // Смена авы
    document.getElementById('avatarInput').onchange = function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
            const img = new Image();
            img.src = ev.target.result;
            img.onload = () => {
                const canvas = document.createElement('canvas');
                canvas.width = 70; canvas.height = 70;
                canvas.getContext('2d').drawImage(img, 0, 0, 70, 70);
                userAvatar = canvas.toDataURL('image/jpeg', 0.5);
                localStorage.setItem('userAvatar', userAvatar);
                document.getElementById('myCurrentAv').src = userAvatar;
            };
        };
        reader.readAsDataURL(file);
    };

    // Функция отправки
    function send() {
        const input = document.getElementById('chatInput');
        const text = input.value.trim();
        if (!text) return;
        
        messagesRef.push({
            u: userId,
            a: userAvatar,
            t: text,
            ts: firebase.database.ServerValue.TIMESTAMP // Правильное серверное время
        }).then(() => {
            input.value = "";
        }).catch(err => {
            console.error(err);
            alert("ОШИБКА: Доступ запрещен. Убедись, что Rules в Firebase настроены!");
        });
    }

    document.getElementById('sendBtn').onclick = send;
    document.getElementById('chatInput').onkeypress = (e) => { if(e.key === 'Enter') send(); };

    // Загрузка сообщений
    messagesRef.limitToLast(50).on('child_added', (snap) => {
        const m = snap.val();
        const isMine = m.u === userId;
        const wrap = document.createElement('div');
        wrap.className = 'msg-wrapper ' + (isMine ? 'mine' : 'others');
        wrap.innerHTML = `<img src="${m.a}" class="avatar"><div class="msg">${m.t}</div>`;
        const box = document.getElementById('chatBox');
        box.appendChild(wrap);
        box.scrollTop = box.scrollHeight;
    });
</script>
