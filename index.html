<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Чат SLAPYA</title>
    
    <!-- ПОДКЛЮЧАЕМ FIREBASE -->
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>

    <style>
        * { box-sizing: border-box; outline: none; }
        body { background: #080808; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .card { background: #111; border: 1px solid #222; border-radius: 24px; width: 95%; max-width: 400px; height: 85vh; display: flex; flex-direction: column; padding: 15px; box-shadow: 0 15px 50px rgba(0,0,0,0.9); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding: 0 5px; }
        #status-dot { width: 10px; height: 10px; background: red; border-radius: 50%; display: inline-block; margin-right: 8px; box-shadow: 0 0 8px red; transition: 0.3s; }
        #chatBox { flex: 1; overflow-y: auto; background: #050505; border-radius: 18px; padding: 12px; display: flex; flex-direction: column; gap: 10px; border: 1px solid #1a1a1a; scroll-behavior: smooth; }
        .msg { padding: 10px 14px; border-radius: 18px; max-width: 85%; font-size: 14px; background: #1a1a1a; word-wrap: break-word; line-height: 1.4; animation: slideIn 0.2s ease; }
        .mine { align-self: flex-end; background: #ff004d; color: #fff; border-bottom-right-radius: 4px; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .input-area { display: flex; gap: 10px; margin-top: 15px; background: #1a1a1a; padding: 8px 8px 8px 15px; border-radius: 30px; border: 1px solid #222; }
        input { flex: 1; border: none; background: transparent; color: #fff; font-size: 15px; }
        button { background: #ff004d; border: none; color: #fff; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        button:active { transform: scale(0.9); }
        .yt-icon { width: 42px; height: 42px; border-radius: 50%; border: 2px solid #ff004d; object-fit: cover; transition: 0.3s; }
    </style>
</head>
<body>

    <div class="card">
        <div class="header">
            <div><div id="status-dot"></div> <b style="color:#ff004d; letter-spacing: 1px;">ЧАТ ДЛЯ ВАС!</b></div>
            <a href="https://youtube.com" target="_blank">
                <img src="yt.jpg" onerror="this.src='https://pravatar.cc'" class="yt-icon">
            </a>
        </div>
        <div id="chatBox"></div>
        <div class="input-area">
            <input type="text" id="chatInput" placeholder="Напишите сообщение..." autocomplete="off">
            <button id="sendBtn">➤</button>
        </div>
    </div>

<script>
    // Ждем полной готовности библиотек
    const startApp = setInterval(() => {
        if (typeof firebase !== 'undefined') {
            clearInterval(startApp);
            initFirebase();
        }
    }, 300);

    function initFirebase() {
        const firebaseConfig = {
            apiKey: "AIzaSyBCuF9Eeu4Imh8kzHto2rNor-P_bgjpeWU",
            authDomain: "://firebaseapp.com",
            databaseURL: "https://firebaseio.com",
            projectId: "slapya-tv",
            storageBucket: "slapya-tv.firebasestorage.app",
            messagingSenderId: "136766849891",
            appId: "1:136766849891:web:deba1aac85e51e6e4894f6"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        // Вход
        firebase.auth().signInAnonymously().catch(e => console.log("Auth:", e.message));

        // Статус связи
        db.ref(".info/connected").on("value", (s) => {
            const dot = document.getElementById('status-dot');
            const isOk = s.val();
            dot.style.background = isOk ? "lime" : "red";
            dot.style.boxShadow = isOk ? "0 0 10px lime" : "0 0 10px red";
        });

        const myId = 'u' + Math.random().toString(36).substr(2, 5);

        // Функция отправки
        function send() {
            const i = document.getElementById('chatInput');
            const text = i.value.trim();
            if (!text) return;
            db.ref('messages').push({ u: myId, t: text });
            i.value = "";
        }

        document.getElementById('sendBtn').onclick = send;
        document.getElementById('chatInput').onkeypress = (e) => { if(e.key === 'Enter') send(); };

        // Слушаем сообщения
        db.ref('messages').limitToLast(40).on('child_added', (snap) => {
            const m = snap.val();
            const d = document.createElement('div');
            d.className = 'msg' + (m.u === myId ? ' mine' : '');
            d.innerText = m.t;
            const box = document.getElementById('chatBox');
            box.appendChild(d);
            box.scrollTop = box.scrollHeight;
        });
    }
</script>
</body>
</html>
