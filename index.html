<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Чат SLAPYA</title>
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    <style>
        * { box-sizing: border-box; }
        body { background: #080808; color: #fff; font-family: sans-serif; margin: 0; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .card { background: #111; border: 1px solid #222; border-radius: 20px; width: 95%; max-width: 400px; height: 85vh; display: flex; flex-direction: column; padding: 15px; }
        #status-dot { width: 10px; height: 10px; background: red; border-radius: 50%; display: inline-block; transition: 0.5s; }
        #chatBox { flex: 1; overflow-y: auto; background: #050505; border-radius: 15px; padding: 10px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px; border-radius: 15px; max-width: 80%; font-size: 14px; background: #1a1a1a; word-wrap: break-word; }
        .mine { align-self: flex-end; background: #ff004d; }
        .input-area { display: flex; gap: 10px; margin-top: 15px; background: #1a1a1a; padding: 8px; border-radius: 25px; }
        input { flex: 1; border: none; background: transparent; color: #fff; outline: none; padding-left: 10px; }
        button { background: #ff004d; border: none; color: #fff; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; }
        .yt { width: 40px; height: 40px; border-radius: 50%; border: 1px solid #ff004d; }
    </style>
</head>
<body>
    <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
            <div><div id="status-dot"></div> <b style="color:#ff004d">ЧАТ ДЛЯ ВАС!</b></div>
            <a href="https://youtube.com" target="_blank"><img src="yt.jpg" onerror="this.src='https://pravatar.cc'" class="yt"></a>
        </div>
        <div id="chatBox"></div>
        <div class="input-area"><input type="text" id="chatInput" placeholder="Напишите..."><button id="sendBtn">➤</button></div>
    </div>
<script>
    const cfg = {
        apiKey: "AIzaSyBCuF9Eeu4Imh8kzHto2rNor-P_bgjpeWU",
        authDomain: "://firebaseapp.com",
        databaseURL: "https://firebaseio.com",
        projectId: "slapya-tv",
        appId: "1:136766849891:web:deba1aac85e51e6e4894f6"
    };
    const check = setInterval(() => {
        if (typeof firebase !== 'undefined') {
            clearInterval(check);
            firebase.initializeApp(cfg);
            const db = firebase.database();
            firebase.auth().signInAnonymously();
            db.ref(".info/connected").on("value", s => {
                document.getElementById('status-dot').style.background = s.val() ? "lime" : "red";
                document.getElementById('status-dot').style.boxShadow = s.val() ? "0 0 10px lime" : "0 0 10px red";
            });
            const myId = Math.random().toString(36).substr(2, 5);
            const send = () => {
                const i = document.getElementById('chatInput');
                if (i.value.trim()) db.ref('messages').push({ u: myId, t: i.value });
                i.value = "";
            };
            document.getElementById('sendBtn').onclick = send;
            document.getElementById('chatInput').onkeypress = e => { if(e.key==='Enter') send(); };
            db.ref('messages').limitToLast(30).on('child_added', snap => {
                const m = snap.val();
                const d = document.createElement('div');
                d.className = 'msg' + (m.u === myId ? ' mine' : '');
                d.innerText = m.t;
                document.getElementById('chatBox').appendChild(d);
                document.getElementById('chatBox').scrollTop = document.getElementById('chatBox').scrollHeight;
            });
        }
    }, 500);
</script>
</body>
</html>
